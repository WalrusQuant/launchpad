name: release

# Cut a signed + notarized macOS release when a version tag is pushed:
#
#   ./scripts/bump-version.sh 0.3.2     # edits the 3 version files, commits, tags
#   git push origin main --follow-tags  # pushing the v0.3.2 tag triggers this
#
# Normal pushes to main do NOT release — only tags matching v* do.
on:
  push:
    tags:
      - "v*"

# Allow the job to create the GitHub release.
permissions:
  contents: write

jobs:
  release:
    name: build signed dmg + publish
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Import the Developer ID Application cert into a throwaway keychain so
      # codesign can find it non-interactively. Standard macOS-runner recipe.
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # Put the new keychain in the search list (keep the existing ones too)
          # so `security find-identity` and codesign see the imported identity.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g)
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Write the App Store Connect API key (.p8) to a file the build can read.
      - name: Write notarization API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey.p8"

      # Reuses the same script run locally — it signs, notarizes + staples the
      # .app AND the .dmg, then verifies with codesign/spctl/stapler.
      - name: Build, sign, notarize
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/asc/AuthKey.p8
        run: ./scripts/build-signed.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DMG="$(ls -t src-tauri/target/release/bundle/dmg/Launchpad_*_aarch64.dmg | head -1)"
          echo "Releasing $GITHUB_REF_NAME with $DMG"
          gh release create "$GITHUB_REF_NAME" "$DMG" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
